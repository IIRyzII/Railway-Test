<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Two-Factor Authentication</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body {
    height: 100vh; margin: 0;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #0a1f33, #104d71);
    font-family: 'Segoe UI', sans-serif;
}
.card-box {
    width: 100%; max-width: 400px; padding: 40px;
    border-radius: 20px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    color: white;
}
.form-control {
    background: rgba(255,255,255,0.1); border: none;
    color: white; border-radius: 10px; padding: 12px;
    letter-spacing: 0.3rem; font-size: 1.4rem; text-align: center;
}
.form-control::placeholder { color: rgba(255,255,255,0.5); }
.form-control:focus {
    box-shadow: none; border: 1px solid #1cc88a;
    background: rgba(255,255,255,0.15);
}
.btn-login {
    background: linear-gradient(135deg, #1cc88a, #13855c);
    border: none; border-radius: 10px; padding: 12px; font-weight: 500;
}
</style>
</head>
<body>
<div class="card-box">
    <div class="text-center mb-4">
        <div style="font-size:3rem;">🔐</div>
        <h4 class="mt-2">Two-Factor Authentication</h4>
        <p style="opacity:0.7;">Enter the 6-digit code from your authenticator app</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="position-fixed top-0 end-0 p-3">
    {% for category, message in messages %}
    <div class="toast show text-bg-{{ 'success' if category=='success' else 'danger' }} mb-2">
        <div class="d-flex">
            <div class="toast-body">{{ message }}</div>
            <button class="btn-close btn-close-white m-auto me-2" onclick="this.parentElement.parentElement.remove()"></button>
        </div>
    </div>
    {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    <form method="POST">
        <div class="mb-4">
            <input name="code" class="form-control" placeholder="000000"
                   maxlength="6" autocomplete="one-time-code" autofocus required>
        </div>
        <div class="d-grid">
            <button class="btn btn-login text-white">Verify Code</button>
        </div>
    </form>

    <div class="text-center mt-3">
        <a href="{{ url_for('LoginPage') }}" style="color:#1cc88a; font-size:0.9rem;">
            ← Back to login
        </a>
    </div>
</div>
<script>setTimeout(()=>document.querySelectorAll('.toast').forEach(t=>t.remove()),3000)</script>
</body>
</html>
