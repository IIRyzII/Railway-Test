<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Invalid Invite — SecureFuture</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body {
    height:100vh; margin:0; display:flex; align-items:center;
    justify-content:center;
    background:linear-gradient(135deg,#0a1f33,#104d71);
    font-family:'Segoe UI',sans-serif; color:white;
}
.box {
    text-align:center; max-width:420px; padding:40px;
    background:rgba(255,255,255,0.08); border-radius:20px;
    backdrop-filter:blur(15px); box-shadow:0 20px 50px rgba(0,0,0,0.4);
}
</style>
</head>
<body>
<div class="box">
    <div style="font-size:3.5rem;">🚫</div>
    <h4 class="mt-3 fw-bold">Invalid or Expired Link</h4>
    <p style="opacity:.75;">
        This invitation link is either invalid, has already been used,
        or has expired. Please contact your administrator to request a new one.
    </p>
    <a href="{{ url_for('LoginPage') }}" class="btn btn-outline-light mt-2">
        ← Back to Login
    </a>
</div>
</body>
</html>
