<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sign Up</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background: linear-gradient(135deg, #fdfdfd, #104d71);
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}
</style>
</head>

<body>
<div class="position-absolute" style="top: 0px; left: 15px;">
    <img src="static/secure.png" alt="Logo" width="240" height="240">
</div>
<div class="card p-4" style="width:400px;">
<h3 class="text-center mb-3">Sign Up</h3>

{% with messages = get_flashed_messages() %}
{% if messages %}
{% for message in messages %}
<div class="alert alert-danger">{{ message }}</div>
{% endfor %}
{% endif %}
{% endwith %}

<form method="POST">
<input name="username" class="form-control mb-3" placeholder="Username" required>
<input name="email" class="form-control mb-3" placeholder="Email" required>
<input name="password" type="password" class="form-control mb-3" placeholder="Password" required>
<select name="role" class="form-select mb-3" required>
  <option value="" disabled selected>Select Role</option>
  <option value="Employee">Employee</option>
  <option value="Manager">Manager</option>
  <option value="Admin">Admin</option>
</select>
<button class="btn btn-success w-100">Sign Up</button>
</form>

<div class="text-center mt-3">
<a href="{{ url_for('LoginPage') }}">Already have account?</a>
</div>
</div>

</body>
</html>
