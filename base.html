<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
    body {
        background: linear-gradient(135deg, #0a1f33, #104d71);
        font-family: 'Inter', sans-serif;
        color: #e4e6eb;
        margin: 0;
    }
    .sidebar {
        width: 240px; height: 100vh; position: fixed;
        background: rgba(0,0,0,0.35); backdrop-filter: blur(10px);
        padding: 25px 0; z-index: 10;
    }
    .sidebar .logo { text-align: center; margin-bottom: 30px; }
    .sidebar .logo img { width: 90px; }
    .sidebar a {
        display: block; padding: 12px 25px; color: #cfd8dc;
        text-decoration: none; font-weight: 500; transition: 0.3s;
    }
    .sidebar a:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .sidebar a.active { background: rgba(255,255,255,0.1); color: #1cc88a; }
    .main { margin-left: 240px; padding: 30px; }
    .topbar {
        display: flex; justify-content: space-between; align-items: center;
        background: rgba(0,0,0,0.35); padding: 15px 20px;
        border-radius: 12px; margin-bottom: 30px;
    }
    .card-box {
        background: rgba(255,255,255,0.06); border-radius: 16px;
        padding: 30px; transition: 0.3s; border: 1px solid rgba(255,255,255,0.08);
    }
    .card-box:hover { transform: translateY(-5px); background: rgba(255,255,255,0.08); }
    .card-box h5 { font-weight: 600; }
    .card-box p { color: #b0bec5; font-size: 0.95rem; }
    .btn-primary { background: #1cc88a; border: none; border-radius: 8px; }
    .btn-primary:hover { background: #17a673; }
    .btn-outline-light { border-color: rgba(255,255,255,0.3); color: white; }
    .btn-outline-light:hover { background: rgba(255,255,255,0.1); }
    .btn-action { margin-top: 15px; border-radius: 8px; padding: 8px 16px; font-size: 0.9rem; }
    .stat-card {
        border-radius: 14px; padding: 20px; text-align: center; color: white;
    }
    .stat-card .num { font-size: 1.8rem; font-weight: 700; }
    .stat-card .label { opacity: 0.85; font-size: 0.9rem; }
    .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    {% block content %}{% endblock %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
